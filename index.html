<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашні завдання</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-item.active .accordion-content {
            max-height: 600px;
        }
        .accordion-item.active .arrow-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header -->
    <header class="bg-indigo-800 text-white py-8 px-4 shadow-lg">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold mb-2">Домашні завдання</h1>
            <p class="text-indigo-200">Каталог вправ від 66 до 105</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto py-10 px-4">
        <div id="homework-container" class="space-y-4">
            <!-- Пункти меню будуть згенеровані тут -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-10 text-gray-500 text-sm">
        <p>© 2024 Home Task Index • Навігація вправами</p>
    </footer>

    <script>
        const container = document.getElementById('homework-container');

        /**
         * Функція для створення блоку меню для кожного номера уроку
         * @param {number} mainNum - Номер уроку (напр. 66)
         */
        function createHomeworkItem(mainNum) {
            const item = document.createElement('div');
            item.className = 'accordion-item bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden';
            
            // Масив підпунктів (вправ) 1, 2, 3, 4, 5
            const subItems = [1, 2, 3, 4, 5];

            // Генеруємо HTML для списку вправ
            // Формат посилання: ./66.1.html, ./66.2.html і т.д.
            const subItemsHtml = subItems.map(subNum => `
                <a href="./${mainNum}.${subNum}.html" class="block px-6 py-3 text-indigo-600 hover:bg-indigo-50 hover:text-indigo-800 transition-colors border-b border-gray-50 last:border-0">
                    🏠 Перейти до вправи уроку ${mainNum}.${subNum}
                </a>
            `).join('');

            item.innerHTML = `
                <button class="w-full px-6 py-4 flex items-center justify-between bg-white hover:bg-gray-50 transition-colors focus:outline-none" onclick="toggleAccordion(this)">
                    <span class="text-lg font-semibold text-gray-700">Урок № ${mainNum}</span>
                    <svg class="arrow-icon w-5 h-5 text-gray-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div class="accordion-content bg-gray-50">
                    <div class="py-2">
                        ${subItemsHtml}
                    </div>
                </div>
            `;
            return item;
        }

        // Генерація списку від 66 до 105
        for (let i = 66; i <= 105; i++) {
            container.appendChild(createHomeworkItem(i));
        }

        /**
         * Функція для відкриття/закриття акордеона
         */
        function toggleAccordion(element) {
            const parent = element.parentElement;
            const isActive = parent.classList.contains('active');
            
            document.querySelectorAll('.accordion-item').forEach(item => {
                item.classList.remove('active');
            });

            if (!isActive) {
                parent.classList.add('active');
            }
        }
    </script>
</body>
</html>
