<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фізика: Контрольні запитання (§31)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .timer-ring { transition: stroke-dashoffset 1s linear; }
        
        .opt-btn {
            font-size: 1.1rem;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes wink {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }
        .eye-wink {
            animation: wink 3s infinite;
            transform-origin: center;
        }
        .smile-float {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="app" class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        
        <!-- Start Screen -->
        <div id="start-screen" class="p-8 md:p-16 flex flex-col items-center text-center">
            <div class="smile-float mb-8">
                <svg width="120" height="120" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#FFD93D" stroke="#000" stroke-width="2"/>
                    <circle cx="35" cy="40" r="5" fill="#000" class="eye-wink"/>
                    <circle cx="65" cy="40" r="5" fill="#000"/>
                    <path d="M30 65C30 65 40 75 50 75C60 75 70 65 70 65" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-6 uppercase tracking-tight">Контрольні запитання</h1>
            <p class="text-xl text-slate-600 mb-10 leading-relaxed">Перевірка знань до параграфа №31. <br> Дай відповіді на 12 запитань за обмежений час!</p>
            <button onclick="quiz.start()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 px-12 rounded-2xl text-2xl shadow-lg transform hover:scale-105 active:scale-95 transition-all">
                ПОЧАТИ ТЕСТ
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden p-6 md:p-10">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <p id="question-counter" class="text-blue-600 font-extrabold text-lg uppercase tracking-wider">Запитання 1/12</p>
                    <div class="w-48 h-3 bg-slate-100 rounded-full mt-2 overflow-hidden">
                        <div id="progress-bar" class="h-full bg-blue-600 progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="relative w-20 h-20">
                    <svg class="w-full h-full transform -rotate-90">
                        <circle cx="50%" cy="50%" r="40%" stroke="#f1f5f9" stroke-width="8" fill="transparent" />
                        <circle id="timer-circle" cx="50%" cy="50%" r="40%" stroke="#2563eb" stroke-width="8" fill="transparent" stroke-dasharray="100" stroke-dashoffset="0" pathLength="100" class="timer-ring" />
                    </svg>
                    <span id="timer-text" class="absolute inset-0 flex items-center justify-center font-black text-xl">20</span>
                </div>
            </div>

            <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-slate-800 mb-8 min-h-[4rem]">Завантаження...</h2>
            
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Buttons injected here -->
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden p-8 md:p-16 flex flex-col items-center text-center">
            <h2 class="text-4xl font-black text-slate-800 mb-2">Твій результат</h2>
            <div id="score-circle" class="text-8xl font-black text-blue-600 my-8">0%</div>
            <p id="result-message" class="text-xl text-slate-600 mb-10 font-medium"></p>
            <button onclick="location.reload()" class="bg-slate-900 text-white font-bold py-4 px-10 rounded-xl hover:bg-black transition-all">
                Спробувати знову
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(600, 'sine', 0.1),
            correct: () => {
                playTone(523.25, 'sine', 0.3);
                setTimeout(() => playTone(659.25, 'sine', 0.4), 100);
            },
            wrong: () => {
                playTone(220, 'triangle', 0.3);
                setTimeout(() => playTone(180, 'triangle', 0.4), 150);
            },
            tick: () => playTone(800, 'sine', 0.05, 0.02)
        };

        const questions = [
            { q: "Як називається процес переходу речовини з рідкого стану в газоподібний?", a: ["Пароутворення", "Конденсація", "Кристалізація", "Плавлення"], c: 0 },
            { q: "Які два основні види пароутворення існують у фізиці?", a: ["Дифузія та конвекція", "Випаровування та кипіння", "Сублімація та плавлення", "Нагрівання та стиснення"], c: 1 },
            { q: "Чим випаровування відрізняється від кипіння?", a: ["Випаровування йде тільки при 100°C", "Кипіння відбувається тільки з поверхні", "Випаровування відбувається за будь-якої температури", "Це ідентичні процеси"], c: 2 },
            { q: "Чому рідина під час випаровування зазвичай охолоджується?", a: ["Її залишають молекули з найбільшою енергією", "В неї потрапляє холодне повітря", "Через зміну атмосферного тиску", "Молекули всередині зупиняються"], c: 0 },
            { q: "Як випаровування впливає на внутрішню енергію рідини (без підведення тепла)?", a: ["Вона зростає", "Вона не змінюється", "Вона зменшується", "Вона стає потенціальною"], c: 2 },
            { q: "Для чого собака в спеку висовує язика?", a: ["Щоб краще чути запахи", "Для охолодження через випаровування слини", "Щоб пити повітря", "Для відлякування ворогів"], c: 1 },
            { q: "Від чого залежить швидкість випаровування рідини?", a: ["Тільки від температури", "Від роду рідини, температури, площі поверхні та руху повітря", "Від маси рідини в посудині", "Від об'єму повітря в кімнаті"], c: 1 },
            { q: "Чому вода в широкій тарілці випарується швидше, ніж у вузькій склянці?", a: ["У тарілці менше води", "Більша площа вільної поверхні", "Тарілка краще гріється", "Склянка тисне на воду"], c: 1 },
            { q: "Як вітер впливає на швидкість випаровування?", a: ["Сповільнює процес", "Не впливає", "Прискорює, бо забирає пару від поверхні", "Тільки охолоджує рідину"], c: 2 },
            { q: "Як називається процес переходу речовини з газоподібного стану в рідкий?", a: ["Сублімація", "Конденсація", "Пароутворення", "Дистиляція"], c: 1 },
            { q: "Яке природне явище є прикладом конденсації водяної пари?", a: ["Утворення роси та туману", "Утворення піску", "Зорепад", "Полярне сяйво"], c: 0 },
            { q: "Що відбувається з енергією під час конденсації пари?", a: ["Енергія поглинається", "Енергія виділяється", "Енергія не змінюється", "Енергія зникає"], c: 1 }
        ];

        class Quiz {
            constructor() {
                this.currentIdx = 0;
                this.score = 0;
                this.timeLeft = 20;
                this.timer = null;
            }

            start() {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                sounds.click();
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                this.showQuestion();
            }

            showQuestion() {
                const q = questions[this.currentIdx];
                document.getElementById('question-counter').innerText = `Запитання ${this.currentIdx + 1}/${questions.length}`;
                document.getElementById('question-text').innerText = q.q;
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                q.a.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "opt-btn w-full text-left p-5 rounded-2xl border-2 border-slate-100 bg-slate-50 hover:bg-white hover:border-blue-500 hover:shadow-md font-semibold text-slate-700";
                    btn.innerText = opt;
                    btn.onclick = () => this.handleAnswer(i);
                    container.appendChild(btn);
                });

                this.resetTimer();
                this.updateProgress();
            }

            resetTimer() {
                clearInterval(this.timer);
                this.timeLeft = 20;
                this.updateTimerUI();
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerUI();
                    if (this.timeLeft <= 5 && this.timeLeft > 0) sounds.tick();
                    if (this.timeLeft <= 0) this.handleAnswer(-1);
                }, 1000);
            }

            updateTimerUI() {
                document.getElementById('timer-text').innerText = this.timeLeft;
                const circle = document.getElementById('timer-circle');
                const offset = 100 - (this.timeLeft / 20) * 100;
                circle.style.strokeDashoffset = offset;
                circle.style.stroke = this.timeLeft <= 5 ? '#ef4444' : '#2563eb';
            }

            updateProgress() {
                const progress = (this.currentIdx / questions.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
            }

            handleAnswer(idx) {
                clearInterval(this.timer);
                const q = questions[this.currentIdx];
                const buttons = document.getElementById('options-container').children;

                for (let btn of buttons) btn.disabled = true;

                if (idx === q.c) {
                    sounds.correct();
                    if (idx !== -1) buttons[idx].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                    this.score++;
                } else {
                    sounds.wrong();
                    if (idx !== -1) buttons[idx].classList.add('bg-red-50', 'border-red-500', 'text-red-700', 'shake');
                    buttons[q.c].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                }

                setTimeout(() => {
                    this.currentIdx++;
                    if (this.currentIdx < questions.length) this.showQuestion();
                    else this.showResults();
                }, 1200);
            }

            showResults() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('results-screen').classList.remove('hidden');
                const percentage = Math.round((this.score / questions.length) * 100);
                document.getElementById('score-circle').innerText = `${percentage}%`;
                
                let msg = percentage === 100 ? "Відмінно! Ти справжній знавець фізики!" :
                          percentage >= 70 ? "Гарна робота! Ти добре знаєш §31." :
                          percentage >= 40 ? "Непогано, але варто перечитати §31 ще раз." :
                          "Спробуй вивчити матеріал параграфа 31 і повернутись!";
                
                document.getElementById('result-message').innerText = msg;
            }
        }

        const quiz = new Quiz();
    </script>
</body>
</html>
